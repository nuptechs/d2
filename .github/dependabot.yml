version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      typescript:
        patterns: ["typescript", "@types/*"]
      testing:
        patterns: ["vitest", "@vitest/*"]
      build-tools:
        patterns: ["turbo", "vite", "@vitejs/*", "tsx"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
